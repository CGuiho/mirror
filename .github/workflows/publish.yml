name: Publish

on:
  push:
    tags:
      - '@guiho/mirror@*'

permissions:
  contents: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        run: |
          git init .
          git remote add origin "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_REF}"
          git checkout --detach FETCH_HEAD

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
          "$HOME/.bun/bin/bun" --version

      - run: bun install --frozen-lockfile
        working-directory: mirror
      - run: bun run typecheck
        working-directory: mirror
      - run: bun test
        working-directory: mirror
      - run: bun run build
        working-directory: mirror

      - name: Stage exact release assets
        working-directory: mirror
        run: |
          cp skills/guiho-s-mirror/SKILL.md bin/guiho-s-mirror
          cp prompts/guiho-i-mirror.md bin/guiho-i-mirror

      - name: Publish exact RFC 0034 assets to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        working-directory: mirror
        run: |
          VERSION=$(bun -e "const p = await Bun.file('./package.json').json(); console.log(p.version)")
          RELEASE_FLAGS=()

          if [[ "$VERSION" == *-* ]]; then
            RELEASE_FLAGS+=(--prerelease)
          else
            RELEASE_FLAGS+=(--latest)
          fi

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" bin/mirror-* bin/guiho-s-mirror bin/guiho-i-mirror --clobber
          else
            gh release create "${GITHUB_REF_NAME}" bin/mirror-* bin/guiho-s-mirror bin/guiho-i-mirror --title "${GITHUB_REF_NAME}" --verify-tag "${RELEASE_FLAGS[@]}"
          fi

      - name: Verify exact fourteen GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        working-directory: mirror
        run: |
          EXPECTED=$(cat <<'EOF'
          guiho-i-mirror
          guiho-s-mirror
          mirror-darwin-arm64
          mirror-darwin-x64
          mirror-darwin-x64-baseline
          mirror-darwin-x64-modern
          mirror-linux-arm64
          mirror-linux-x64
          mirror-linux-x64-baseline
          mirror-linux-x64-modern
          mirror-windows-arm64.exe
          mirror-windows-x64-baseline.exe
          mirror-windows-x64-modern.exe
          mirror-windows-x64.exe
          EOF
          )
          ACTUAL=$(gh release view "${GITHUB_REF_NAME}" --json assets --jq -r '.assets[].name' | sort)
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "Mirror release does not contain the exact fourteen RFC 0034 assets." >&2
            gh release view "${GITHUB_REF_NAME}" --json assets --jq '.assets[].name' >&2
            exit 1
          fi
