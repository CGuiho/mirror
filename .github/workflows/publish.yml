name: Publish

on:
  push:
    tags:
      - '@guiho/mirror@*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: mirror

    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: ''

      - run: npm --version
      - run: node --version

      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
      - run: bun run build

      - name: Upload GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(bun -e "console.log(require('./package.json').version)")
          RELEASE_FLAGS=()

          if [[ "$VERSION" == *-* ]]; then
            RELEASE_FLAGS+=(--prerelease)
          else
            RELEASE_FLAGS+=(--latest)
          fi

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" bin/guiho-mirror-* --clobber
          else
            gh release create "$GITHUB_REF_NAME" bin/guiho-mirror-* --title "$GITHUB_REF_NAME" --verify-tag "${RELEASE_FLAGS[@]}"
          fi

      - run: cp ../README.md .
      - run: cp ../CHANGELOG.md .

      - run: npm config delete always-auth || true

      - name: Publish to npm
        run: |
          VERSION=$(bun -e "console.log(require('./package.json').version)")

          TAG=$(bun -e '
            const version = require("./package.json").version;

            const prereleaseMatch = version.match(/^\d+\.\d+\.\d+-([^+]+)/);

            if (!prereleaseMatch) {
              console.log("latest");
              process.exit(0);
            }

            const prerelease = prereleaseMatch[1];
            const firstIdentifier = prerelease.split(".")[0];

            if (/[A-Za-z]/.test(firstIdentifier)) {
              console.log(firstIdentifier);
            } else {
              console.log("prerelease");
            }
          ')

          echo "Package version: $VERSION"
          echo "Publishing with npm dist-tag: $TAG"

          npm publish --access public --tag "$TAG"
