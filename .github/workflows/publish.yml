name: Publish

on:
  push:
    tags:
      - '@guiho/mirror@*'

permissions:
  contents: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        run: |
          git init .
          git remote add origin "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_REF}"
          git checkout --detach FETCH_HEAD

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
          "$HOME/.bun/bin/bun" --version

      - run: bun install --frozen-lockfile
        working-directory: mirror
      - run: bun run typecheck
        working-directory: mirror
      - run: bun test
        working-directory: mirror
      - run: bun run build
        working-directory: mirror

      - name: Stage exact release assets
        working-directory: mirror
        run: |
          cp skills/guiho-s-mirror/SKILL.md bin/guiho-s-mirror.md
          cp prompts/guiho-i-mirror.md bin/guiho-i-mirror.md

      - name: Publish exact RFC 0034 assets to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        working-directory: mirror
        run: |
          VERSION=$(bun -e "const p = await Bun.file('./package.json').json(); console.log(p.version)")
          EXPECTED_ASSETS="${RUNNER_TEMP}/mirror-expected-assets.txt"
          RELEASE_NOTES="${RUNNER_TEMP}/mirror-release-notes.md"
          bun run source/release-assets.ts > "$EXPECTED_ASSETS"
          bun run source/release-notes.ts ../CHANGELOG.md "$VERSION" > "$RELEASE_NOTES"
          mapfile -t ASSET_NAMES < "$EXPECTED_ASSETS"
          ASSET_PATHS=()
          for ASSET_NAME in "${ASSET_NAMES[@]}"; do
            ASSET_PATHS+=("bin/${ASSET_NAME}")
          done
          RELEASE_FLAGS=()

          if [[ "$VERSION" == *-* ]]; then
            RELEASE_FLAGS+=(--prerelease)
          else
            RELEASE_FLAGS+=(--latest)
          fi

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            while IFS= read -r CURRENT_ASSET; do
              if ! grep -Fxq "$CURRENT_ASSET" "$EXPECTED_ASSETS"; then
                gh release delete-asset "${GITHUB_REF_NAME}" "$CURRENT_ASSET" --yes
              fi
            done < <(gh release view "${GITHUB_REF_NAME}" --json assets --jq '.assets[].name')
            gh release upload "${GITHUB_REF_NAME}" "${ASSET_PATHS[@]}" --clobber
            gh release edit "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes-file "$RELEASE_NOTES" "${RELEASE_FLAGS[@]}"
          else
            gh release create "${GITHUB_REF_NAME}" "${ASSET_PATHS[@]}" --title "${GITHUB_REF_NAME}" --notes-file "$RELEASE_NOTES" --verify-tag "${RELEASE_FLAGS[@]}"
          fi

      - name: Verify exact fourteen GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        working-directory: mirror
        run: |
          EXPECTED_ASSETS="${RUNNER_TEMP}/mirror-expected-assets.txt"
          ACTUAL_ASSETS="${RUNNER_TEMP}/mirror-actual-assets.txt"
          bun run source/release-assets.ts > "$EXPECTED_ASSETS"
          gh release view "${GITHUB_REF_NAME}" --json assets --jq '.assets[].name' | sort > "$ACTUAL_ASSETS"
          EXPECTED_COUNT=$(wc -l < "$EXPECTED_ASSETS" | tr -d '[:space:]')
          ACTUAL_COUNT=$(wc -l < "$ACTUAL_ASSETS" | tr -d '[:space:]')
          UNIQUE_COUNT=$(sort -u "$ACTUAL_ASSETS" | wc -l | tr -d '[:space:]')
          if [ "$EXPECTED_COUNT" -ne 14 ] || [ "$ACTUAL_COUNT" -ne 14 ] || [ "$UNIQUE_COUNT" -ne 14 ] || ! cmp -s "$EXPECTED_ASSETS" "$ACTUAL_ASSETS"; then
            echo "Mirror release does not contain the exact fourteen RFC 0034 assets." >&2
            echo "Expected (${EXPECTED_COUNT}):" >&2
            cat "$EXPECTED_ASSETS" >&2
            echo "Actual (${ACTUAL_COUNT}, ${UNIQUE_COUNT} unique):" >&2
            cat "$ACTUAL_ASSETS" >&2
            exit 1
          fi

      - name: Verify public Linux installer
        env:
          GH_TOKEN: ${{ github.token }}
        working-directory: mirror
        run: |
          set -o pipefail
          expected_version="$(bun -e 'console.log((await Bun.file("package.json").json()).version)')"
          public_home="$(mktemp -d)"
          project_dir="$(mktemp -d)"
          install_dir="$public_home/.local/bin"
          previous_home="$(mktemp -d)"
          previous_project_dir="$(mktemp -d)"
          previous_install_dir="$previous_home/.local/bin"
          trap 'rm -rf "$public_home" "$project_dir" "$previous_home" "$previous_project_dir"' EXIT
          export HOME="$public_home"
          export MIRROR_INSTALL_DIR="$install_dir"
          export MIRROR_SKIP_PATH_UPDATE=1
          export MIRROR_DISABLE_UPDATE_CHECK=1
          cd "$project_dir"
          curl -fsSL https://raw.githubusercontent.com/CGuiho/mirror/main/devops/install.sh | bash
          test "$("$install_dir/mirror" --version)" = "$expected_version"
          "$install_dir/mirror" | grep -Fq '║  MIRROR'
          "$install_dir/mirror" | grep -Fq "version       v$expected_version"
          test -s "$HOME/.guiho/mirror/schema.json"
          test -s "$HOME/.agents/skills/guiho-s-mirror/SKILL.md"
          test -s "$HOME/.claude/skills/guiho-s-mirror/SKILL.md"
          test -s "$project_dir/AGENTS.md"
          grep -Fq '<!-- BEGIN MIRROR — DO NOT EDIT THIS SECTION -->' "$project_dir/AGENTS.md"
          grep -Fq '<!-- END MIRROR -->' "$project_dir/AGENTS.md"

          previous_tag="$(
            gh release list --repo "$GITHUB_REPOSITORY" --limit 100 \
              --exclude-drafts --exclude-pre-releases --json tagName --jq '.[].tagName' \
              | grep -Fxv "$GITHUB_REF_NAME" | head -n 1
          )"
          test -n "$previous_tag"
          previous_version="${previous_tag##*@}"
          export HOME="$previous_home"
          export MIRROR_INSTALL_DIR="$previous_install_dir"
          cd "$previous_project_dir"
          curl -fsSL https://raw.githubusercontent.com/CGuiho/mirror/main/devops/install.sh \
            | bash -s -- --version "$previous_version"
          test "$("$previous_install_dir/mirror" --version)" = "$previous_version"
          curl -fsSL https://raw.githubusercontent.com/CGuiho/mirror/main/devops/install.sh \
            | bash -s -- --version "$expected_version"
          test "$("$previous_install_dir/mirror" --version)" = "$expected_version"
          test -s "$previous_home/.guiho/mirror/schema.json"

          export HOME="$public_home"
          export MIRROR_INSTALL_DIR="$install_dir"
          cd "$project_dir"
          timeout 180 "$install_dir/mirror" upgrade --version "$previous_version" \
            | tee "$RUNNER_TEMP/mirror-public-progress.txt"
          test "$("$install_dir/mirror" --version)" = "$previous_version"
          grep -Eq '^(\[[#-]{40}\]|Download progress:)' \
            "$RUNNER_TEMP/mirror-public-progress.txt"
          curl -fsSL https://raw.githubusercontent.com/CGuiho/mirror/main/devops/install.sh \
            | bash -s -- --version "$expected_version"
          test "$("$install_dir/mirror" --version)" = "$expected_version"
